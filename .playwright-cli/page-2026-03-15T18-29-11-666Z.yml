          - heading "Safety notes" [level=2] [ref=e774]
          - list [ref=e775]:
            - listitem [ref=e776]: Use Evo 2 and related models for proposal and ranking, not direct execution.
            - listitem [ref=e777]: Preserve uncertainty at every stage and block autonomous deployment by default.
            - listitem [ref=e778]: Archive mission, plan, and review artifacts for every run.
            - listitem [ref=e779]: Flag all inter-model disagreements above threshold for human review.
            - listitem [ref=e780]: Gate full organism engineering behind successful cell-free validation.
            - listitem [ref=e781]: Validate sim-to-real transfer in Earth-analog chambers before any deployment.
            - listitem [ref=e782]: Enforce stopping criteria and budget limits on Bayesian optimization loops.
            - listitem [ref=e783]: Keep sequence rewrites inside experimentally supported promoter grammar regimes.
            - listitem [ref=e784]: Reject perturbation predictions that fail generalization holdouts, even if in-distribution scores are high.
            - listitem [ref=e785]: Respect spatial exclusion zones and niche collapse risks before scale-up.
            - listitem [ref=e786]: Treat imputed spatial signals as provisional until uncertainty and alignment budgets are reviewed.
            - listitem [ref=e787]: Enforce operational design domain checks and control barrier monitors at runtime.
            - listitem [ref=e788]: Escalate any unresolved hazard blind spots or refusal-trigger gaps to human review.
          - heading "Recommended Next Steps" [level=2] [ref=e789]
          - list [ref=e790]:
            - listitem [ref=e791]: Resolve the validation warnings before promoting any controller or genome proposal.
            - listitem [ref=e792]: Review promoter rewrites against reporter or MPRA-style assays before escalating to chassis work.
            - listitem [ref=e793]: Inspect unseen-perturbation and unseen-cell-state holdout failures before trusting zero-shot response predictions.
            - listitem [ref=e794]: Run the declared cell-free validation matrix before organism-level engineering.
            - listitem [ref=e795]: Validate niche exclusion zones and communication corridors in a structured analog assay.
          - heading "Success metrics" [level=2] [ref=e796]
